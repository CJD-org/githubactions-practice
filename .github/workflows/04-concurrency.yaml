# if you push code mutilple time, it will fail,  it will take latest one  code .
# okesari multiple persond trigger cheyakuda  concurrency use chestuna.

name: concurrency
on: [push] # tigger
concurrency:
# this workfloe should be trigger fot any branch  only once
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # Existing will be cancelled and latest will run 
jobs: 
  concurrency:
    runs-on: ubuntu-latest 
    steps:
      - name: step-1
        run: sleep 30
      - name: step-1
        run: sleep 10